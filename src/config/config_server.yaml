# ============================================
# 服务器全量训练配置文件 (Linux + GPU)
# ============================================

# 项目信息
project:
  name: "network-attack-detection"
  version: "0.1.0"
  description: "基于多源数据融合的网络攻击检测系统"

# ============================================
# 数据配置
# ============================================
data:
  # 数据路径 - 请根据服务器实际路径修改
  raw_dir: "server_datasets/raw"
  processed_dir: "data/processed"
  log_dir: "server_datasets/logs"

  # 多机构数据源（路径与 download_datasets.py 下载目录一致）
  institutional_sources:
    - name: "CSE-CIC-IDS2018"
      institution: "CIC + CSE (University of New Brunswick)"
      enabled: true
      path: "server_datasets/raw/CSE-CIC-IDS2018"
    - name: "UNSW-NB15"
      institution: "UNSW Canberra"
      enabled: false
      path: "server_datasets/raw/UNSW-NB15"
    - name: "KDD-Cup-99"
      institution: "UCI / MIT Lincoln Labs"
      enabled: false
      path: "server_datasets/raw/KDD-Cup-99"

  # 威胁情报数据路径
  threat_intel:
    enabled: true
    dir: "server_datasets/threat_intel"
    sources:
      - name: "abuse_ch"
        type: "ip_reputation"
        path: "server_datasets/threat_intel/abuse_ch"
      - name: "emerging_threats"
        type: "signature"
        path: "server_datasets/threat_intel/emerging_threats"
      - name: "mitre_attack"
        type: "attack_pattern"
        path: "server_datasets/threat_intel/mitre_attack"
    feature_mapping: "server_datasets/threat_intel/threat_intel_features.json"

  # 真实日志配置
  logs:
    enabled: true
    path: null
    time_window_minutes: 5
    generate_synthetic_if_missing: false
    random_state: 42

  # 预处理选项
  preprocessing:
    binary_classification: false  # true: 二分类, false: 多分类
    feature_selection: "correlation"  # all, variance, correlation
    normalize: true

  # 数据平衡
  balance:
    enabled: false
    method: "smote"  # smote, adasyn, undersample, smote_tomek

  # 数据划分
  split:
    test_size: 0.2
    val_size: 0.1
    stratify: true
    random_state: 42

  # 三源数据分割（流量 + 日志 + 威胁情报）
  multi_source:
    source1_groups: ["traffic", "temporal", "flags", "header", "bulk"]  # 源1: 流量特征
    source2_groups: ["log"]                          # 源2: 真实日志特征
    extra_source_groups: [["threat_intel"]]          # 源3: 威胁情报特征 (IP信誉/签名/ATT&CK)

  # DataLoader配置 - 服务器优化
  loader:
    batch_size: 256
    num_workers: 8
    pin_memory: true
    use_weighted_sampler: false
    augment_train: false

# ============================================
# 模型配置
# ============================================
model:
  # 模型类型
  type: "fusion_net"  # single_source, fusion_net, fusion_net_gated

  # 网络结构
  architecture:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.3
    activation: "relu"  # relu, gelu, leaky_relu
    encoder_type: "mlp"  # mlp, cnn, lstm, transformer

  # 融合配置
  fusion:
    method: "attention"  # concat, attention, gated, multi_head, cross
    attention_heads: 4

  # 输入/输出维度（自动根据数据设置）
  input_dim: null
  source1_dim: null
  source2_dim: null
  num_classes: null

# ============================================
# 训练配置
# ============================================
training:
  # 基本参数
  epochs: 100
  batch_size: 256

  # 优化器
  optimizer:
    type: "adamw"
    learning_rate: 0.001
    weight_decay: 0.0001
    momentum: 0.9
    betas: [0.9, 0.999]

  # 学习率调度
  scheduler:
    type: "cosine"
    warmup_epochs: 5
    step_size: 30
    gamma: 0.1
    min_lr: 0.00001

  # 早停
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001
    monitor: "val_loss"

  # 损失函数
  loss:
    type: "cross_entropy"
    class_weights: null
    focal_gamma: 2.0
    label_smoothing: 0.0

  # 梯度裁剪
  gradient_clip:
    enabled: true
    max_norm: 1.0

  # 混合精度训练 - 服务器GPU启用
  mixed_precision: true

  # 检查点
  checkpoint:
    save_best: true
    save_last: true
    save_every: 10

# ============================================
# 评估配置
# ============================================
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc
    - confusion_matrix

  eval_every: 1
  per_class_metrics: true

# ============================================
# 实验配置
# ============================================
experiment:
  name: null
  seed: 42
  deterministic: true
  device: "auto"  # auto 会自动检测 GPU
  multi_gpu: false

# ============================================
# 输出配置
# ============================================
output:
  checkpoint_dir: "outputs/checkpoints"
  results_dir: "outputs/results"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"
  tensorboard: true
  wandb: false
  log_every: 10

# ============================================
# 消融实验配置
# ============================================
ablation:
  # 单源 vs 双源 vs 三源对比
  compare_sources:
    enabled: true
    sources: ["source1_only", "source2_only", "source3_only", "source1+2", "source1+3", "source2+3", "fusion_all"]

  # 融合方法对比
  compare_fusion:
    enabled: true
    methods: ["concat", "attention", "gated", "multi_head", "cross"]

  # 超参数搜索
  hyperparam_search:
    enabled: false
    hidden_dims: [128, 256, 512]
    num_layers: [2, 3, 4]
    dropouts: [0.2, 0.3, 0.4]
    learning_rates: [0.0001, 0.001, 0.01]
